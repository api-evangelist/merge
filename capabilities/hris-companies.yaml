naftiko: 1.0.0-alpha2
info:
  label: Merge HRIS API — Companies
  description: 'Merge HRIS API — Companies. 1 operations. Lead operation: Merge List Companies. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Companies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: hris-companies
    baseUri: https://api.merge.dev/api/hris/v1
    description: Merge HRIS API — Companies business capability. Self-contained, no shared references.
    resources:
    - name: companies
      path: /companies
      operations:
      - name: listcompanies
        method: GET
        description: Merge List Companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: hris-companies-rest
    port: 8080
    description: REST adapter for Merge HRIS API — Companies. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/companies
      name: companies
      description: REST surface for companies.
      operations:
      - method: GET
        name: listcompanies
        description: Merge List Companies
        call: hris-companies.listcompanies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hris-companies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge HRIS API — Companies. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: merge-list-companies
      description: Merge List Companies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-companies.listcompanies
      outputParameters:
      - type: object
        mapping: $.
