naftiko: 1.0.0-alpha2
info:
  label: Merge Accounting API — Invoices
  description: 'Merge Accounting API — Invoices. 2 operations. Lead operation: Merge List Invoices. Self-contained Naftiko
    capability covering one Merge business surface.'
  tags:
  - Merge
  - Invoices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-invoices
    baseUri: https://api.merge.dev/api/accounting/v1
    description: Merge Accounting API — Invoices business capability. Self-contained, no shared references.
    resources:
    - name: invoices
      path: /invoices
      operations:
      - name: listinvoices
        method: GET
        description: Merge List Invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter by invoice type.
      - name: createinvoice
        method: POST
        description: Merge Create Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: accounting-invoices-rest
    port: 8080
    description: REST adapter for Merge Accounting API — Invoices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/invoices
      name: invoices
      description: REST surface for invoices.
      operations:
      - method: GET
        name: listinvoices
        description: Merge List Invoices
        call: accounting-invoices.listinvoices
        with:
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createinvoice
        description: Merge Create Invoice
        call: accounting-invoices.createinvoice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-invoices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Accounting API — Invoices. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: merge-list-invoices
      description: Merge List Invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-invoices.listinvoices
      with:
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-create-invoice
      description: Merge Create Invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounting-invoices.createinvoice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
