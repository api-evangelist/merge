naftiko: 1.0.0-alpha2
info:
  label: Merge Ticketing API — Teams
  description: 'Merge Ticketing API — Teams. 1 operations. Lead operation: Merge List Teams. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ticketing-teams
    baseUri: https://api.merge.dev/api/ticketing/v1
    description: Merge Ticketing API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: teams
      path: /teams
      operations:
      - name: listteams
        method: GET
        description: Merge List Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ticketing-teams-rest
    port: 8080
    description: REST adapter for Merge Ticketing API — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/teams
      name: teams
      description: REST surface for teams.
      operations:
      - method: GET
        name: listteams
        description: Merge List Teams
        call: ticketing-teams.listteams
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ticketing-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Ticketing API — Teams. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: merge-list-teams
      description: Merge List Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketing-teams.listteams
      outputParameters:
      - type: object
        mapping: $.
