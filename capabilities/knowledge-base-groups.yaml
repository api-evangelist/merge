naftiko: 1.0.0-alpha2
info:
  label: Merge Knowledge Base API — Groups
  description: 'Merge Knowledge Base API — Groups. 2 operations. Lead operation: Merge List Groups. Self-contained Naftiko
    capability for ACL groups feeding article/container permissions.'
  tags:
  - Merge
  - Knowledge Base
  - Groups
  - ACL
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: knowledge-base-groups
    baseUri: https://api.merge.dev/api/knowledgebase/v1
    description: Merge Knowledge Base API — Groups business capability. ACL building block tying users to permitted content.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: listgroups
        method: GET
        description: Merge List Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups-id
      path: /groups/{id}
      operations:
      - name: getgroup
        method: GET
        description: Merge Get Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: mcp
    namespace: knowledge-base-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Knowledge Base API — Groups.
    tools:
    - name: merge-list-groups
      description: Merge List Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-groups.listgroups
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-get-group
      description: Merge Get Group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-groups.getgroup
      outputParameters:
      - type: object
        mapping: $.
