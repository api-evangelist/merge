naftiko: 1.0.0-alpha2
info:
  label: Merge HRIS API — Groups
  description: 'Merge HRIS API — Groups. 1 operations. Lead operation: Merge List Groups. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: hris-groups
    baseUri: https://api.merge.dev/api/hris/v1
    description: Merge HRIS API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: listgroups
        method: GET
        description: Merge List Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: hris-groups-rest
    port: 8080
    description: REST adapter for Merge HRIS API — Groups. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: listgroups
        description: Merge List Groups
        call: hris-groups.listgroups
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hris-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge HRIS API — Groups. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: merge-list-groups
      description: Merge List Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-groups.listgroups
      outputParameters:
      - type: object
        mapping: $.
