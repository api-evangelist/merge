naftiko: 1.0.0-alpha2
info:
  label: Merge Ticketing API — Users
  description: 'Merge Ticketing API — Users. 1 operations. Lead operation: Merge List Users. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ticketing-users
    baseUri: https://api.merge.dev/api/ticketing/v1
    description: Merge Ticketing API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Merge List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ticketing-users-rest
    port: 8080
    description: REST adapter for Merge Ticketing API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Merge List Users
        call: ticketing-users.listusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ticketing-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Ticketing API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: merge-list-users
      description: Merge List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketing-users.listusers
      outputParameters:
      - type: object
        mapping: $.
