naftiko: 1.0.0-alpha2
info:
  label: Merge ATS API — Jobs
  description: 'Merge ATS API — Jobs. 2 operations. Lead operation: Merge List Jobs. Self-contained Naftiko capability covering
    one Merge business surface.'
  tags:
  - Merge
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ats-jobs
    baseUri: https://api.merge.dev/api/ats/v1
    description: Merge ATS API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: Merge List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by job status.
    - name: jobs-id
      path: /jobs/{id}
      operations:
      - name: getjob
        method: GET
        description: Merge Get Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ats-jobs-rest
    port: 8080
    description: REST adapter for Merge ATS API — Jobs. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: listjobs
        description: Merge List Jobs
        call: ats-jobs.listjobs
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{id}
      name: jobs-id
      description: REST surface for jobs-id.
      operations:
      - method: GET
        name: getjob
        description: Merge Get Job
        call: ats-jobs.getjob
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ats-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge ATS API — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: merge-list-jobs
      description: Merge List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ats-jobs.listjobs
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-get-job
      description: Merge Get Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ats-jobs.getjob
      outputParameters:
      - type: object
        mapping: $.
