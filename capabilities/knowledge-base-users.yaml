naftiko: 1.0.0-alpha2
info:
  label: Merge Knowledge Base API — Users
  description: 'Merge Knowledge Base API — Users. 2 operations. Lead operation: Merge List Users. Self-contained Naftiko capability
    for KB user identities feeding ACL.'
  tags:
  - Merge
  - Knowledge Base
  - Users
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: knowledge-base-users
    baseUri: https://api.merge.dev/api/knowledgebase/v1
    description: Merge Knowledge Base API — Users business capability.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Merge List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-id
      path: /users/{id}
      operations:
      - name: getuser
        method: GET
        description: Merge Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: mcp
    namespace: knowledge-base-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Knowledge Base API — Users.
    tools:
    - name: merge-list-kb-users
      description: Merge List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-users.listusers
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-get-kb-user
      description: Merge Get User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-users.getuser
      outputParameters:
      - type: object
        mapping: $.
