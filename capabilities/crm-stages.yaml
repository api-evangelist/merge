naftiko: 1.0.0-alpha2
info:
  label: Merge CRM API — Stages
  description: 'Merge CRM API — Stages. 1 operations. Lead operation: Merge List Stages. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Stages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: crm-stages
    baseUri: https://api.merge.dev/api/crm/v1
    description: Merge CRM API — Stages business capability. Self-contained, no shared references.
    resources:
    - name: stages
      path: /stages
      operations:
      - name: liststages
        method: GET
        description: Merge List Stages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: crm-stages-rest
    port: 8080
    description: REST adapter for Merge CRM API — Stages. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stages
      name: stages
      description: REST surface for stages.
      operations:
      - method: GET
        name: liststages
        description: Merge List Stages
        call: crm-stages.liststages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-stages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge CRM API — Stages. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: merge-list-stages
      description: Merge List Stages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-stages.liststages
      outputParameters:
      - type: object
        mapping: $.
