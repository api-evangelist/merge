naftiko: 1.0.0-alpha2
info:
  label: Merge Knowledge Base API — Containers
  description: 'Merge Knowledge Base API — Containers. 2 operations. Lead operation: Merge List Containers. Self-contained
    Naftiko capability covering one Merge business surface.'
  tags:
  - Merge
  - Knowledge Base
  - Containers
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: knowledge-base-containers
    baseUri: https://api.merge.dev/api/knowledgebase/v1
    description: Merge Knowledge Base API — Containers business capability. Containers group articles into spaces/pages/categories.
    resources:
    - name: containers
      path: /containers
      operations:
      - name: listcontainers
        method: GET
        description: Merge List Containers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: containers-id
      path: /containers/{id}
      operations:
      - name: getcontainer
        method: GET
        description: Merge Get Container
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: mcp
    namespace: knowledge-base-containers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Knowledge Base API — Containers.
    tools:
    - name: merge-list-containers
      description: Merge List Containers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-containers.listcontainers
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-get-container
      description: Merge Get Container
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-containers.getcontainer
      outputParameters:
      - type: object
        mapping: $.
