naftiko: 1.0.0-alpha2
info:
  label: Merge Ticketing API — Projects
  description: 'Merge Ticketing API — Projects. 1 operations. Lead operation: Merge List Projects. Self-contained Naftiko
    capability covering one Merge business surface.'
  tags:
  - Merge
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ticketing-projects
    baseUri: https://api.merge.dev/api/ticketing/v1
    description: Merge Ticketing API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: Merge List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ticketing-projects-rest
    port: 8080
    description: REST adapter for Merge Ticketing API — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects
      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: listprojects
        description: Merge List Projects
        call: ticketing-projects.listprojects
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ticketing-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Ticketing API — Projects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: merge-list-projects
      description: Merge List Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketing-projects.listprojects
      outputParameters:
      - type: object
        mapping: $.
