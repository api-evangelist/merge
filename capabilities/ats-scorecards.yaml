naftiko: 1.0.0-alpha2
info:
  label: Merge ATS API — Scorecards
  description: 'Merge ATS API — Scorecards. 1 operations. Lead operation: Merge List Scorecards. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Scorecards
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ats-scorecards
    baseUri: https://api.merge.dev/api/ats/v1
    description: Merge ATS API — Scorecards business capability. Self-contained, no shared references.
    resources:
    - name: scorecards
      path: /scorecards
      operations:
      - name: listscorecards
        method: GET
        description: Merge List Scorecards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: application_id
          in: query
          type: string
          description: Filter by application ID.
        - name: interview_id
          in: query
          type: string
          description: Filter by interview ID.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ats-scorecards-rest
    port: 8080
    description: REST adapter for Merge ATS API — Scorecards. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/scorecards
      name: scorecards
      description: REST surface for scorecards.
      operations:
      - method: GET
        name: listscorecards
        description: Merge List Scorecards
        call: ats-scorecards.listscorecards
        with:
          application_id: rest.application_id
          interview_id: rest.interview_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ats-scorecards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge ATS API — Scorecards. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: merge-list-scorecards
      description: Merge List Scorecards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ats-scorecards.listscorecards
      with:
        application_id: tools.application_id
        interview_id: tools.interview_id
      outputParameters:
      - type: object
        mapping: $.
