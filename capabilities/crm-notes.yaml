naftiko: 1.0.0-alpha2
info:
  label: Merge CRM API — Notes
  description: 'Merge CRM API — Notes. 2 operations. Lead operation: Merge List Notes. Self-contained Naftiko capability covering
    one Merge business surface.'
  tags:
  - Merge
  - Notes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: crm-notes
    baseUri: https://api.merge.dev/api/crm/v1
    description: Merge CRM API — Notes business capability. Self-contained, no shared references.
    resources:
    - name: notes
      path: /notes
      operations:
      - name: listnotes
        method: GET
        description: Merge List Notes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createnote
        method: POST
        description: Merge Create Note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: crm-notes-rest
    port: 8080
    description: REST adapter for Merge CRM API — Notes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/notes
      name: notes
      description: REST surface for notes.
      operations:
      - method: GET
        name: listnotes
        description: Merge List Notes
        call: crm-notes.listnotes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createnote
        description: Merge Create Note
        call: crm-notes.createnote
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-notes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge CRM API — Notes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: merge-list-notes
      description: Merge List Notes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-notes.listnotes
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-create-note
      description: Merge Create Note
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: crm-notes.createnote
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
