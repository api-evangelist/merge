naftiko: 1.0.0-alpha2
info:
  label: Merge Ticketing API — Tickets
  description: 'Merge Ticketing API — Tickets. 4 operations. Lead operation: Merge List Tickets. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ticketing-tickets
    baseUri: https://api.merge.dev/api/ticketing/v1
    description: Merge Ticketing API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: tickets
      path: /tickets
      operations:
      - name: listtickets
        method: GET
        description: Merge List Tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by ticket status.
        - name: priority
          in: query
          type: string
          description: Filter by priority.
        - name: project_id
          in: query
          type: string
          description: Filter by project ID.
      - name: createticket
        method: POST
        description: Merge Create Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tickets-id
      path: /tickets/{id}
      operations:
      - name: getticket
        method: GET
        description: Merge Get Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateticket
        method: PATCH
        description: Merge Update Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ticketing-tickets-rest
    port: 8080
    description: REST adapter for Merge Ticketing API — Tickets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tickets
      name: tickets
      description: REST surface for tickets.
      operations:
      - method: GET
        name: listtickets
        description: Merge List Tickets
        call: ticketing-tickets.listtickets
        with:
          status: rest.status
          priority: rest.priority
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createticket
        description: Merge Create Ticket
        call: ticketing-tickets.createticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tickets/{id}
      name: tickets-id
      description: REST surface for tickets-id.
      operations:
      - method: GET
        name: getticket
        description: Merge Get Ticket
        call: ticketing-tickets.getticket
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateticket
        description: Merge Update Ticket
        call: ticketing-tickets.updateticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ticketing-tickets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Ticketing API — Tickets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: merge-list-tickets
      description: Merge List Tickets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketing-tickets.listtickets
      with:
        status: tools.status
        priority: tools.priority
        project_id: tools.project_id
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-create-ticket
      description: Merge Create Ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ticketing-tickets.createticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-get-ticket
      description: Merge Get Ticket
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketing-tickets.getticket
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-update-ticket
      description: Merge Update Ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ticketing-tickets.updateticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
