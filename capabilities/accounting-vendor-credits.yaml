naftiko: 1.0.0-alpha2
info:
  label: Merge Accounting API — Vendor Credits
  description: 'Merge Accounting API — Vendor Credits. 1 operations. Lead operation: Merge List Vendor Credits. Self-contained
    Naftiko capability covering one Merge business surface.'
  tags:
  - Merge
  - Vendor Credits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-vendor-credits
    baseUri: https://api.merge.dev/api/accounting/v1
    description: Merge Accounting API — Vendor Credits business capability. Self-contained, no shared references.
    resources:
    - name: vendor-credits
      path: /vendor-credits
      operations:
      - name: listvendorcredits
        method: GET
        description: Merge List Vendor Credits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: accounting-vendor-credits-rest
    port: 8080
    description: REST adapter for Merge Accounting API — Vendor Credits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vendor-credits
      name: vendor-credits
      description: REST surface for vendor-credits.
      operations:
      - method: GET
        name: listvendorcredits
        description: Merge List Vendor Credits
        call: accounting-vendor-credits.listvendorcredits
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-vendor-credits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Accounting API — Vendor Credits. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: merge-list-vendor-credits
      description: Merge List Vendor Credits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-vendor-credits.listvendorcredits
      outputParameters:
      - type: object
        mapping: $.
