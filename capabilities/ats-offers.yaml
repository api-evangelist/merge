naftiko: 1.0.0-alpha2
info:
  label: Merge ATS API — Offers
  description: 'Merge ATS API — Offers. 1 operations. Lead operation: Merge List Offers. Self-contained Naftiko capability
    covering one Merge business surface.'
  tags:
  - Merge
  - Offers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ats-offers
    baseUri: https://api.merge.dev/api/ats/v1
    description: Merge ATS API — Offers business capability. Self-contained, no shared references.
    resources:
    - name: offers
      path: /offers
      operations:
      - name: listoffers
        method: GET
        description: Merge List Offers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ats-offers-rest
    port: 8080
    description: REST adapter for Merge ATS API — Offers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/offers
      name: offers
      description: REST surface for offers.
      operations:
      - method: GET
        name: listoffers
        description: Merge List Offers
        call: ats-offers.listoffers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ats-offers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge ATS API — Offers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: merge-list-offers
      description: Merge List Offers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ats-offers.listoffers
      outputParameters:
      - type: object
        mapping: $.
