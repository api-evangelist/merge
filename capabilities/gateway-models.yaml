naftiko: 1.0.0-alpha2
info:
  label: Merge Gateway — Models & Vendors
  description: 'Merge Gateway — Models & Vendors. Lead operation: List Models. Self-contained capability for discovering routable
    LLM models and execution vendors.'
  tags:
  - Merge
  - Gateway
  - LLM
  - Models
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    MERGE_GATEWAY_API_KEY: MERGE_GATEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: gateway-models
    baseUri: https://api-gateway.merge.dev
    description: Merge Gateway — Models & Vendors business capability for LLM discovery.
    resources:
    - name: models
      path: /models
      operations:
      - name: listmodels
        method: GET
        description: List Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: provider
          in: query
          type: string
          description: Filter models by provider (e.g. anthropic, openai, google).
        - name: vendor
          in: query
          type: string
          description: Filter models by execution vendor.
        - name: cursor
          in: query
          type: string
          description: Pagination cursor.
        - name: limit
          in: query
          type: integer
          description: Maximum results.
    - name: vendors
      path: /vendors
      operations:
      - name: listvendors
        method: GET
        description: List Execution Vendors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vendors-id
      path: /vendors/{vendor_id}
      operations:
      - name: getvendor
        method: GET
        description: Get Vendor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_GATEWAY_API_KEY}}'
  exposes:
  - type: mcp
    namespace: gateway-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Gateway — Models.
    tools:
    - name: gateway-list-models
      description: List Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-models.listmodels
      outputParameters:
      - type: object
        mapping: $.
    - name: gateway-list-vendors
      description: List Execution Vendors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-models.listvendors
      outputParameters:
      - type: object
        mapping: $.
    - name: gateway-get-vendor
      description: Get Vendor
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-models.getvendor
      outputParameters:
      - type: object
        mapping: $.
