naftiko: 1.0.0-alpha2
info:
  label: Merge Ticketing API — Contacts
  description: 'Merge Ticketing API — Contacts. 1 operations. Lead operation: Merge List Contacts. Self-contained Naftiko
    capability covering one Merge business surface.'
  tags:
  - Merge
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ticketing-contacts
    baseUri: https://api.merge.dev/api/ticketing/v1
    description: Merge Ticketing API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: listcontacts
        method: GET
        description: Merge List Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ticketing-contacts-rest
    port: 8080
    description: REST adapter for Merge Ticketing API — Contacts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: GET
        name: listcontacts
        description: Merge List Contacts
        call: ticketing-contacts.listcontacts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ticketing-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Ticketing API — Contacts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: merge-list-contacts
      description: Merge List Contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketing-contacts.listcontacts
      outputParameters:
      - type: object
        mapping: $.
