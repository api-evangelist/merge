naftiko: 1.0.0-alpha2
info:
  label: Merge File Storage API — Folders
  description: 'Merge File Storage API — Folders. 2 operations. Lead operation: Merge List Folders. Self-contained Naftiko
    capability covering one Merge business surface.'
  tags:
  - Merge
  - Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: file-storage-folders
    baseUri: https://api.merge.dev/api/filestorage/v1
    description: Merge File Storage API — Folders business capability. Self-contained, no shared references.
    resources:
    - name: folders
      path: /folders
      operations:
      - name: listfolders
        method: GET
        description: Merge List Folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parent_folder_id
          in: query
          type: string
          description: Filter by parent folder ID.
        - name: drive_id
          in: query
          type: string
          description: Filter by drive ID.
      - name: createfolder
        method: POST
        description: Merge Create Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: file-storage-folders-rest
    port: 8080
    description: REST adapter for Merge File Storage API — Folders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/folders
      name: folders
      description: REST surface for folders.
      operations:
      - method: GET
        name: listfolders
        description: Merge List Folders
        call: file-storage-folders.listfolders
        with:
          parent_folder_id: rest.parent_folder_id
          drive_id: rest.drive_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfolder
        description: Merge Create Folder
        call: file-storage-folders.createfolder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: file-storage-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge File Storage API — Folders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: merge-list-folders
      description: Merge List Folders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: file-storage-folders.listfolders
      with:
        parent_folder_id: tools.parent_folder_id
        drive_id: tools.drive_id
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-create-folder
      description: Merge Create Folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: file-storage-folders.createfolder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
