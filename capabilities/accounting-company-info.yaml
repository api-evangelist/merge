naftiko: 1.0.0-alpha2
info:
  label: Merge Accounting API — Company Info
  description: 'Merge Accounting API — Company Info. 1 operations. Lead operation: Merge List Company Info. Self-contained
    Naftiko capability covering one Merge business surface.'
  tags:
  - Merge
  - Company Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-company-info
    baseUri: https://api.merge.dev/api/accounting/v1
    description: Merge Accounting API — Company Info business capability. Self-contained, no shared references.
    resources:
    - name: company-info
      path: /company-info
      operations:
      - name: listcompanyinfo
        method: GET
        description: Merge List Company Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: accounting-company-info-rest
    port: 8080
    description: REST adapter for Merge Accounting API — Company Info. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/company-info
      name: company-info
      description: REST surface for company-info.
      operations:
      - method: GET
        name: listcompanyinfo
        description: Merge List Company Info
        call: accounting-company-info.listcompanyinfo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-company-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Accounting API — Company Info. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: merge-list-company-info
      description: Merge List Company Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-company-info.listcompanyinfo
      outputParameters:
      - type: object
        mapping: $.
