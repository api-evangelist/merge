naftiko: 1.0.0-alpha2
info:
  label: Merge Knowledge Base API — Articles
  description: 'Merge Knowledge Base API — Articles. 3 operations. Lead operation: Merge List Articles. Self-contained Naftiko
    capability covering one Merge business surface.'
  tags:
  - Merge
  - Knowledge Base
  - Articles
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: knowledge-base-articles
    baseUri: https://api.merge.dev/api/knowledgebase/v1
    description: Merge Knowledge Base API — Articles business capability. Self-contained, no shared references.
    resources:
    - name: articles
      path: /articles
      operations:
      - name: listarticles
        method: GET
        description: Merge List Articles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: created_after
          in: query
          type: string
          description: Filter by creation date after this timestamp.
        - name: created_before
          in: query
          type: string
          description: Filter by creation date before this timestamp.
        - name: modified_after
          in: query
          type: string
          description: Filter by modification date after this timestamp.
        - name: modified_before
          in: query
          type: string
          description: Filter by modification date before this timestamp.
        - name: cursor
          in: query
          type: string
          description: Pagination cursor.
        - name: page_size
          in: query
          type: integer
          description: Number of results to return per page.
        - name: expand
          in: query
          type: string
          description: Comma-separated related-object fields to expand.
        - name: include_remote_data
          in: query
          type: boolean
          description: Whether to include raw remote payload.
    - name: articles-id
      path: /articles/{id}
      operations:
      - name: getarticle
        method: GET
        description: Merge Get Article
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: knowledge-base-articles-rest
    port: 8080
    description: REST adapter for Merge Knowledge Base API — Articles.
    resources:
    - path: /v1/articles
      name: articles
      description: REST surface for articles.
      operations:
      - method: GET
        name: listarticles
        description: Merge List Articles
        call: knowledge-base-articles.listarticles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/articles/{id}
      name: articles-id
      description: REST surface for articles-id.
      operations:
      - method: GET
        name: getarticle
        description: Merge Get Article
        call: knowledge-base-articles.getarticle
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: knowledge-base-articles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Knowledge Base API — Articles.
    tools:
    - name: merge-list-articles
      description: Merge List Articles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-articles.listarticles
      outputParameters:
      - type: object
        mapping: $.
    - name: merge-get-article
      description: Merge Get Article
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: knowledge-base-articles.getarticle
      outputParameters:
      - type: object
        mapping: $.
