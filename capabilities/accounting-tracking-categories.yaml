naftiko: 1.0.0-alpha2
info:
  label: Merge Accounting API — Tracking Categories
  description: 'Merge Accounting API — Tracking Categories. 1 operations. Lead operation: Merge List Tracking Categories.
    Self-contained Naftiko capability covering one Merge business surface.'
  tags:
  - Merge
  - Tracking Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-tracking-categories
    baseUri: https://api.merge.dev/api/accounting/v1
    description: Merge Accounting API — Tracking Categories business capability. Self-contained, no shared references.
    resources:
    - name: tracking-categories
      path: /tracking-categories
      operations:
      - name: listtrackingcategories
        method: GET
        description: Merge List Tracking Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: accounting-tracking-categories-rest
    port: 8080
    description: REST adapter for Merge Accounting API — Tracking Categories. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/tracking-categories
      name: tracking-categories
      description: REST surface for tracking-categories.
      operations:
      - method: GET
        name: listtrackingcategories
        description: Merge List Tracking Categories
        call: accounting-tracking-categories.listtrackingcategories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-tracking-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Accounting API — Tracking Categories. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: merge-list-tracking-categories
      description: Merge List Tracking Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-tracking-categories.listtrackingcategories
      outputParameters:
      - type: object
        mapping: $.
