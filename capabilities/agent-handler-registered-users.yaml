naftiko: 1.0.0-alpha2
info:
  label: Merge Agent Handler — Registered Users
  description: 'Merge Agent Handler — Registered Users. Lead operation: List Registered Users. Self-contained capability for
    end-user identity provisioning and Link token minting.'
  tags:
  - Merge
  - Agent Handler
  - Registered Users
  - Link Tokens
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    MERGE_AH_API_KEY: MERGE_AH_API_KEY
capability:
  consumes:
  - type: http
    namespace: agent-handler-registered-users
    baseUri: https://ah-api.merge.dev/api/v1
    description: Merge Agent Handler — Registered Users business capability.
    resources:
    - name: registered-users
      path: /registered-users/
      operations:
      - name: listregisteredusers
        method: GET
        description: List Registered Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createregistereduser
        method: POST
        description: Create Registered User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: registered-users-id
      path: /registered-users/{registered_user_id}/
      operations:
      - name: getregistereduser
        method: GET
        description: Get Registered User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: registered-users-link-token
      path: /registered-users/{registered_user_id}/link-token/
      operations:
      - name: mintlinktoken
        method: POST
        description: Mint Link Token for Registered User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.MERGE_AH_API_KEY}}'
  exposes:
  - type: mcp
    namespace: agent-handler-registered-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Agent Handler — Registered Users.
    tools:
    - name: ah-list-registered-users
      description: List Registered Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agent-handler-registered-users.listregisteredusers
      outputParameters:
      - type: object
        mapping: $.
    - name: ah-create-registered-user
      description: Create Registered User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agent-handler-registered-users.createregistereduser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ah-mint-link-token
      description: Mint Link Token for Registered User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agent-handler-registered-users.mintlinktoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
