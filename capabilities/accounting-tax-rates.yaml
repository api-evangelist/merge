naftiko: 1.0.0-alpha2
info:
  label: Merge Accounting API — Tax Rates
  description: 'Merge Accounting API — Tax Rates. 1 operations. Lead operation: Merge List Tax Rates. Self-contained Naftiko
    capability covering one Merge business surface.'
  tags:
  - Merge
  - Tax Rates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MERGE_API_KEY: MERGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-tax-rates
    baseUri: https://api.merge.dev/api/accounting/v1
    description: Merge Accounting API — Tax Rates business capability. Self-contained, no shared references.
    resources:
    - name: tax-rates
      path: /tax-rates
      operations:
      - name: listtaxrates
        method: GET
        description: Merge List Tax Rates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MERGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: accounting-tax-rates-rest
    port: 8080
    description: REST adapter for Merge Accounting API — Tax Rates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tax-rates
      name: tax-rates
      description: REST surface for tax-rates.
      operations:
      - method: GET
        name: listtaxrates
        description: Merge List Tax Rates
        call: accounting-tax-rates.listtaxrates
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-tax-rates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Merge Accounting API — Tax Rates. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: merge-list-tax-rates
      description: Merge List Tax Rates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-tax-rates.listtaxrates
      outputParameters:
      - type: object
        mapping: $.
