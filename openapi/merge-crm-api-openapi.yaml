      description: >-
        Returns a list of `Account` objects.{/* BEGIN_CRM_ACCOUNT_FETCH_SUPPORTED_FIELDS
        */}<Footer><MergeSupportedFieldsByIntegrationWidget requestType="GET"
        data=""
        /></Footer>{/* END_CRM_ACCOUNT_FETCH_SUPPORTED_FIELDS */}
