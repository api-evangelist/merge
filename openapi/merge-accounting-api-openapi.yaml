        issue_date:
          type: string
          format: date-time
        delivery_date:
          type: string
          format: date-time
        delivery_address:
          type: string
        customer:
          type: string
          format: uuid
        vendor:
          type: string
          format: uuid
        memo:
          type: string
        total_amount:
          type: number
          example: 5000.00
        currency:
          type: string
          example: "USD"
        remote_was_deleted:
          type: boolean
    PurchaseOrderRequest:
      type: object
      properties:
        model:
          type: object
          properties:
            status:
              type: string
            issue_date:
              type: string
