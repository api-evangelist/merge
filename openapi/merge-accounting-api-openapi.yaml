components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    accountToken:
      type: apiKey
      in: header
      name: X-Account-Token
  parameters:
    cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor.
    pageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 100
      description: Number of results per page.
    includeRemoteData:
      name: include_remote_data
      in: query
      schema:
        type: boolean
      description: Whether to include raw third-party data.
  schemas:
    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "9871b4a9-f5d2-4f3b-a66b-dfedbed42c46"
        remote_id:
          type: string
        name:
          type: string
          example: "Cash"
        description:
          type: string
        classification:
          type: string
          enum: [ASSET, EQUITY, EXPENSE, LIABILITY, REVENUE]
          example: "ASSET"
        type:
          type: string
          example: "Bank"
        status:
          type: string
          enum: [ACTIVE, PENDING, INACTIVE]
          example: "ACTIVE"
        current_balance:
          type: number
          example: 25000.00
        currency:
          type: string
          example: "USD"
        account_number:
          type: string
          example: "1000"
        parent_account:
          type: string
          format: uuid
        company:
          type: string
          format: uuid
        remote_was_deleted:
          type: boolean
    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        name:
          type: string
          example: "Acme Corp"
        is_supplier:
          type: boolean
        is_customer:
          type: boolean
        email_address:
          type: string
          format: email
          example: "accounts@acme.com"
        tax_number:
          type: string
        status:
          type: string
          enum: [ACTIVE, ARCHIVED]
        currency:
          type: string
          example: "USD"
        company:
          type: string
          format: uuid
        remote_was_deleted:
          type: boolean
    ContactRequest:
      type: object
      properties:
        model:
          type: object
          properties:
            name:
              type: string
            is_supplier:
              type: boolean
            is_customer:
              type: boolean
            email_address:
              type: string
    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        type:
          type: string
          enum: [ACCOUNTS_RECEIVABLE, ACCOUNTS_PAYABLE]
          example: "ACCOUNTS_RECEIVABLE"
        contact:
          type: string
          format: uuid
        number:
          type: string
          example: "INV-0001"
        issue_date:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        paid_on_date:
          type: string
          format: date-time
        memo:
          type: string
        currency:
          type: string
          example: "USD"
        total_discount:
          type: number
        sub_total:
          type: number
          example: 1000.00
        total_tax_amount:
          type: number
        total_amount:
          type: number
          example: 1080.00
        balance:
          type: number
          example: 1080.00
        status:
          type: string
          enum: [DRAFT, SUBMITTED, PARTIALLY_PAID, PAID, OVERDUE, VOIDED]
          example: "SUBMITTED"
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
        remote_was_deleted:
          type: boolean
    InvoiceRequest:
      type: object
      properties:
        model:
          type: object
          properties:
            type:
              type: string
            contact:
              type: string
              format: uuid
            number:
              type: string
            issue_date:
              type: string
              format: date-time
            due_date:
              type: string
              format: date-time
            currency:
              type: string
            line_items:
              type: array
              items:
                type: object
                properties:
                  description:
                    type: string
                  unit_price:
                    type: number
                  quantity:
                    type: number
                  account:
                    type: string
                    format: uuid
    InvoiceLineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        description:
          type: string
          example: "Consulting services"
        unit_price:
          type: number
          example: 200.00
        quantity:
          type: number
          example: 5
        total_amount:
          type: number
          example: 1000.00
        currency:
          type: string
        account:
          type: string
          format: uuid
        item:
          type: string
          format: uuid
        tracking_category:
          type: string
          format: uuid
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        transaction_date:
          type: string
          format: date-time
        contact:
          type: string
          format: uuid
        account:
          type: string
          format: uuid
        currency:
          type: string
          example: "USD"
        total_amount:
          type: number
          example: 1080.00
        remote_was_deleted:
          type: boolean
    PaymentRequest:
      type: object
      properties:
        model:
          type: object
          properties:
            transaction_date:
              type: string
              format: date-time
            contact:
              type: string
              format: uuid
            account:
              type: string
              format: uuid
            total_amount:
              type: number
            currency:
              type: string
    JournalEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        transaction_date:
          type: string
          format: date-time
        payments:
          type: array
          items:
            type: string
            format: uuid
        memo:
          type: string
          example: "Monthly adjustment"
        currency:
          type: string
          example: "USD"
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLine'
        remote_was_deleted:
          type: boolean
    JournalEntryRequest:
      type: object
      properties:
        model:
          type: object
          properties:
            transaction_date:
              type: string
              format: date-time
            memo:
              type: string
            currency:
              type: string
            lines:
              type: array
              items:
                type: object
                properties:
                  account:
                    type: string
                    format: uuid
                  net_amount:
                    type: number
    JournalLine:
      type: object
      properties:
        remote_id:
          type: string
        account:
          type: string
          format: uuid
        net_amount:
          type: number
          example: 5000.00
        description:
          type: string
        contact:
          type: string
          format: uuid
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        transaction_date:
          type: string
          format: date-time
        account:
          type: string
          format: uuid
        contact:
          type: string
          format: uuid
        total_amount:
          type: number
          example: 250.00
        currency:
          type: string
          example: "USD"
        memo:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseLine'
        remote_was_deleted:
          type: boolean
    ExpenseRequest:
      type: object
      properties:
        model:
          type: object
          properties:
            transaction_date:
              type: string
              format: date-time
            account:
              type: string
              format: uuid
            total_amount:
              type: number
            currency:
              type: string
    ExpenseLine:
      type: object
      properties:
        remote_id:
          type: string
        account:
          type: string
          format: uuid
        net_amount:
          type: number
        description:
          type: string
    CompanyInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        name:
          type: string
          example: "Acme Corporation"
        legal_name:
          type: string
        currency:
          type: string
          example: "USD"
        fiscal_year_end_month:
          type: integer
          example: 12
        fiscal_year_end_day:
          type: integer
          example: 31
        urls:
          type: array
          items:
            type: string
        remote_was_deleted:
          type: boolean
    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        name:
          type: string
          example: "Consulting Hour"
        status:
          type: string
          enum: [ACTIVE, ARCHIVED]
        unit_price:
          type: number
          example: 200.00
        purchase_price:
          type: number
        purchase_account:
          type: string
          format: uuid
        sales_account:
          type: string
          format: uuid
        remote_was_deleted:
          type: boolean
    TaxRate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        description:
          type: string
          example: "Sales Tax"
        total_tax_rate:
          type: number
          example: 8.0
        effective_tax_rate:
          type: number
          example: 8.0
        remote_was_deleted:
          type: boolean
    TrackingCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        remote_id:
          type: string
        name:
          type: string
          example: "Region"
        status:
