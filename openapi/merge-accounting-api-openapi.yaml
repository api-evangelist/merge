openapi: 3.0.3
info:
  title: Merge Accounting API
  description: >-
    Unified API for integrating with accounting platforms including QuickBooks
    Online, Xero, NetSuite, and Sage Intacct. Provides normalized access to
    accounts, contacts, invoices, payments, journal entries, expenses, and
    other financial transaction data across all connected integrations.
  version: "1.0.0"
  contact:
    name: Merge Support
    url: https://help.merge.dev/
  x-generated-from: documentation
  x-last-validated: "2026-04-18"
servers:
  - url: https://api.merge.dev/api/accounting/v1
    description: Merge Accounting API production server
security:
  - bearerAuth: []
    accountToken: []
paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: Merge List Accounts
      description: Returns a list of Account objects from the connected accounting system.
      tags:
        - Accounts
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
      responses:
        '200':
          description: A paginated list of Account objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccountList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /contacts:
    get:
      operationId: listContacts
      summary: Merge List Contacts
      description: Returns a list of Contact objects (customers, vendors).
      tags:
        - Contacts
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
      responses:
        '200':
          description: A paginated list of Contact objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContactList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createContact
      summary: Merge Create Contact
      description: Creates a Contact object in the connected accounting system.
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
      responses:
        '201':
          description: The created Contact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
