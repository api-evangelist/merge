          type: string
        options:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/SecretOptionPublic'
      required:
        - name
        - human_readable_name
        - prefix
        - suffix
        - field_type
        - options
      title: SecretSchemaPublic
    AuthOptionPublic:
      type: object
      properties:
        type:
          type: string
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretSchemaPublic'
      required:
        - type
        - secrets
      title: AuthOptionPublic
    ConnectorToolMini:
      type: object
      properties:
        name:
          type: string
        description:
          type:
            - string
            - 'null'
