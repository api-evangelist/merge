        - description
        - credit_type
      description: Mini version of ConnectorTool serializer that excludes input_schema details.
      title: ConnectorToolMini
    ConnectorDetailPublicResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the Connector
        name:
          type: string
          description: Name of the Connector
        slug:
          type: string
          description: Slug identifier for the Connector
        description:
          type: string
          description: Description of what the Connector does
        source_url:
          type:
            - string
            - 'null'
          description: URL to the Connector's source website
        logo_url:
          type: string
          description: URL to the Connector's logo image
        categories:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Categories this connector belongs to
        auth_options:
          type: array
          items:
            $ref: '#/components/schemas/AuthOptionPublic'
          description: Authentication options available for this connector
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ConnectorToolMini'
          description: List of available tools for this connector
      required:
        - id
        - name
        - slug
        - description
        - source_url
        - logo_url
        - categories
        - auth_options
        - tools
