      description: >-
        # The Employment Object

        ### Description

        The `Employment` object is used to represent a job position at a company.


        If an integration supports historical tracking of employments, it will be reflected in the data. If not, a new
        `Employment` object will be created whenever there is a change in job title or pay. The `effective_date` field
        should be used to order `Employment` objects, with the most recent date corresponding to the latest employment
