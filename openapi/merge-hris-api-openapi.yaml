openapi: 3.0.3
info:
  title: Merge HRIS API
  description: >-
    Unified API for integrating with 80+ HR, payroll, and directory platforms
    including Workday, BambooHR, Gusto, Rippling, and ADP. Provides normalized
    access to employees, companies, employments, teams, groups, pay groups,
    benefits, time off, and directory data across all connected integrations.
  version: "1.0.0"
  contact:
    name: Merge Support
    url: https://help.merge.dev/
    email: support@merge.dev
  license:
    name: Merge Terms of Use
    url: https://www.merge.dev/legal/terms
  x-generated-from: documentation
  x-last-validated: "2026-04-18"
servers:
  - url: https://api.merge.dev/api/hris/v1
    description: Merge HRIS API production server
security:
  - bearerAuth: []
    accountToken: []
paths:
  /employees:
    get:
      operationId: listEmployees
      summary: Merge List Employees
      description: Returns a list of Employee objects across all connected HRIS integrations.
      tags:
        - Employees
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by creation date after this timestamp.
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by creation date before this timestamp.
        - name: modified_after
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by modification date after this timestamp.
        - name: modified_before
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by modification date before this timestamp.
        - name: manager_id
          in: query
          schema:
            type: string
          description: Filter employees by manager ID.
        - name: company_id
          in: query
          schema:
            type: string
          description: Filter employees by company ID.
        - name: work_location_id
          in: query
          schema:
            type: string
          description: Filter employees by work location ID.
        - name: employment_status
          in: query
          schema:
            type: string
            enum:
              - ACTIVE
              - PENDING
              - INACTIVE
          description: Filter by employment status.
      responses:
        '200':
          description: A paginated list of Employee objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmployeeList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createEmployee
      summary: Merge Create Employee
      description: Creates an Employee object in the connected HRIS integration.
      tags:
        - Employees
      parameters:
        - $ref: '#/components/parameters/includeRemoteData'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeRequest'
      responses:
        '201':
          description: The created Employee object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /employees/{id}:
    get:
      operationId: getEmployee
      summary: Merge Get Employee
      description: Returns an Employee object with the given ID.
      tags:
        - Employees
      parameters:
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/includeRemoteData'
      responses:
        '200':
          description: The Employee object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /companies:
    get:
      operationId: listCompanies
      summary: Merge List Companies
      description: Returns a list of Company objects.
      tags:
        - Companies
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
      responses:
        '200':
          description: A paginated list of Company objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompanyList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /employments:
    get:
      operationId: listEmployments
      summary: Merge List Employments
      description: Returns a list of Employment objects.
      tags:
        - Employments
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
        - name: employee_id
          in: query
          schema:
            type: string
          description: Filter employments by employee ID.
      responses:
        '200':
          description: A paginated list of Employment objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmploymentList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /teams:
    get:
      operationId: listTeams
      summary: Merge List Teams
      description: Returns a list of Team objects.
      tags:
        - Teams
      parameters:
        - $ref: '#/components/parameters/cursor'
