      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /benefits:
    get:
      operationId: listBenefits
      summary: Merge List Benefits
      description: Returns a list of Benefit objects.
      tags:
        - Benefits
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
      responses:
        '200':
          description: A paginated list of Benefit objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBenefitList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /time-off:
    get:
      operationId: listTimeOff
      summary: Merge List Time Off
      description: Returns a list of TimeOff objects.
      tags:
        - Time Off
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
        - name: employee_id
          in: query
          schema:
            type: string
          description: Filter time off records by employee ID.
        - name: status
          in: query
          schema:
            type: string
            enum:
              - REQUESTED
              - APPROVED
              - DECLINED
              - CANCELLED
              - DELETED
          description: Filter by time off request status.
      responses:
        '200':
          description: A paginated list of TimeOff objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTimeOffList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createTimeOff
      summary: Merge Create Time Off
      description: Creates a TimeOff object in the connected HRIS integration.
      tags:
        - Time Off
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeOffRequest'
      responses:
        '201':
          description: The created TimeOff object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeOff'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /time-off-balances:
    get:
      operationId: listTimeOffBalances
      summary: Merge List Time Off Balances
      description: Returns a list of TimeOffBalance objects.
      tags:
        - Time Off
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
        - name: employee_id
          in: query
          schema:
            type: string
          description: Filter balances by employee ID.
      responses:
        '200':
          description: A paginated list of TimeOffBalance objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTimeOffBalanceList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /pay-groups:
    get:
      operationId: listPayGroups
      summary: Merge List Pay Groups
      description: Returns a list of PayGroup objects.
      tags:
        - Payroll
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
      responses:
        '200':
          description: A paginated list of PayGroup objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPayGroupList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /groups:
    get:
      operationId: listGroups
      summary: Merge List Groups
      description: Returns a list of Group objects (departments, teams, cost centers, etc.).
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
      responses:
        '200':
          description: A paginated list of Group objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGroupList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /bank-info:
    get:
      operationId: listBankInfo
      summary: Merge List Bank Info
      description: Returns a list of BankInfo objects.
      tags:
        - Payroll
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
        - name: employee_id
          in: query
          schema:
            type: string
          description: Filter by employee ID.
      responses:
        '200':
          description: A paginated list of BankInfo objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBankInfoList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /employee-payroll-runs:
    get:
      operationId: listEmployeePayrollRuns
      summary: Merge List Employee Payroll Runs
      description: Returns a list of EmployeePayrollRun objects.
      tags:
        - Payroll
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/includeRemoteData'
        - name: employee_id
          in: query
          schema:
