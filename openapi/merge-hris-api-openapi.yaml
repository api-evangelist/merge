        */}<Footer><MergeSupportedFieldsByIntegrationWidget requestType="GET"
        data=""
        /></Footer>{/* END_HRIS_BANKINFO_FETCH_SUPPORTED_FIELDS */}
      tags:
        - subpackage_bankInfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: expand
          in: query
