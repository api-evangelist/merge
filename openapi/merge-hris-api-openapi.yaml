            Which relations should be returned in expanded form. Multiple relation names should be comma separated
            without spaces.
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/BankInfoIdGetParametersExpandSchemaItems'
        - name: include_remote_data
