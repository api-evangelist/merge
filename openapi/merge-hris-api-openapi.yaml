          description: Filter by employee ID.
      responses:
        '200':
          description: A paginated list of EmployeePayrollRun objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmployeePayrollRunList'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /payroll-runs:
    get:
      operationId: listPayrollRuns
      summary: Merge List Payroll Runs
      description: Returns a list of PayrollRun objects.
      tags:
