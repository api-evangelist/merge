specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Merge
providerId: merge
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Unified API
description: Merge rate limits scale with plan.
sources:
  - https://www.merge.dev/pricing
  - https://docs.merge.dev/basics/api-limits/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Launch
    scope: account
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: Professional
    scope: account
    metric: requests_per_minute
    limit: 400
    timeFrame: minute
  - name: Enterprise
    scope: account
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
