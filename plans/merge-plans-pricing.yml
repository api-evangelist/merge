      - name: Email + chat support
  - id: merge-enterprise
    name: Enterprise
    type: enterprise
    description: Contract-based pricing.
    entries:
      - label: Annual (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Audit Trail
      - name: Premium go-live support
      - name: Unlimited sandbox
      - name: Dedicated CSM + Slack channel
      - name: Support and uptime SLAs
      - name: 600 req/min rate limit
