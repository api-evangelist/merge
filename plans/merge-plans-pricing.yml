plans:
  - id: merge-launch
    name: Launch
    type: freemium
    description: Free for first 3 production Linked Accounts; $650/mo for up to 10; $65 per additional.
    entries:
      - label: First 3 prod accounts free
        name: free
        type: quota
        metric: account
        limit: 3
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: $650/mo for up to 10
        name: tier_10
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '650.00'
        userMultiplied: false
      - label: Per additional account
        name: extra
        type: metered
        metric: account
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '65.00'
        userMultiplied: false
    elements:
      - name: Unlimited data usage
      - name: All production integrations
      - name: Normalized data with read/write
      - name: Embedded Merge Link / Magic Link
      - name: 100 req/min rate limit
      - name: 3-day log retention
  - id: merge-professional
    name: Professional
    type: paid
    description: Contract-based pricing.
    entries:
