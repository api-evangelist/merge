name: Merge
tags:
- Integrations
- Platform
- Unified API
- Agent Handler
- LLM Gateway
kind: contract
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
access: 3rd-Party
created: '2025-06-05'
modified: '2026-05-22'
position: Consuming
segments:
- Unified_API
- Agent_Handler
- LLM_Gateway
description: Merge is the connective infrastructure for production AI. The Merge Unified API offers one API surface across HRIS, ATS, Accounting, CRM, Ticketing, File Storage, Knowledge Base, and Chat. Merge Agent Handler exposes pre-built enterprise connectors to AI agents via REST + MCP. Merge Gateway provides a unified LLM API across OpenAI, Anthropic, Google, Mistral, Cohere, and xAI with routing, caching, and observability.
integrations:
- name: Microsoft Teams
- name: Notion
- name: Oracle Fusion Cloud ERP Beta
- name: UKG Pro
- name: Google Drive Beta
- name: Workday Beta
- name: QuickBooks Online Beta
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
specificationVersion: '0.19'
common:
- type: ArazzoWorkflows
  url: arazzo/
  workflows:
  - url: arazzo/merge-accounting-bulk-create-expenses-poll-workflow.yml
    name: Merge Accounting Bulk Create Expenses and Poll the Batch
    summary: Submit a batch of expenses asynchronously, then poll the batch until it finishes and branch on the final status.
  - url: arazzo/merge-accounting-create-contact-and-invoice-workflow.yml
    name: Merge Accounting Bill a Customer
    summary: Create a customer contact, raise an invoice against that contact, and confirm the invoice.
  - url: arazzo/merge-accounting-link-account-workflow.yml
    name: Merge Accounting Link an Account
    summary: Create a Merge Link token for the Accounting category, exchange the public token for an account token, and confirm the linked accounting platform.
  - url: arazzo/merge-ats-advance-application-stage-workflow.yml
    name: Merge ATS Advance an Application Stage
    summary: Find a candidate's application, resolve a target interview stage for its job, and move the application into that stage.
  - url: arazzo/merge-ats-create-candidate-and-application-workflow.yml
    name: Merge ATS Add a Candidate and Application
    summary: Create a candidate, resolve an open job, and submit an application linking the candidate to that job.
  - url: arazzo/merge-ats-link-account-workflow.yml
    name: Merge ATS Link an Account
    summary: Create a Merge Link token for the ATS category, exchange the public token for an account token, and confirm the linked applicant tracking system.
  - url: arazzo/merge-crm-create-account-and-contact-workflow.yml
    name: Merge CRM Create an Account with a Contact
    summary: Create a CRM account, attach a primary contact to it, and confirm the contact was written.
  - url: arazzo/merge-crm-create-opportunity-workflow.yml
    name: Merge CRM Open an Opportunity
    summary: Resolve a pipeline stage and an account, then create an opportunity placed at that stage on that account.
  - url: arazzo/merge-crm-link-account-workflow.yml
    name: Merge CRM Link an Account
    summary: Create a Merge Link token for the CRM category, exchange the public token for an account token, and confirm the linked CRM.
  - url: arazzo/merge-crm-log-engagement-workflow.yml
    name: Merge CRM Log an Engagement on a Contact
    summary: Resolve a contact by email, log an engagement against that contact, and confirm the engagement.
  - url: arazzo/merge-cross-category-sync-health-check-workflow.yml
    name: Merge Cross-Category Sync Health Check
    summary: Read sync status and open issues for both an HRIS and a CRM linked account in a single monitoring pass.
  - url: arazzo/merge-filestorage-browse-and-download-workflow.yml
    name: Merge File Storage Browse and Download a File
    summary: List files in a linked file storage account, read the first file's metadata, and download its contents.
  - url: arazzo/merge-filestorage-link-account-workflow.yml
    name: Merge File Storage Link an Account
    summary: Create a Merge Link token for the File Storage category, exchange the public token for an account token, and confirm the linked file storage provider.
  - url: arazzo/merge-hris-create-time-off-workflow.yml
    name: Merge HRIS Submit a Time Off Request
    summary: Resolve an employee on a linked HRIS account and submit a time off request on their behalf.
  - url: arazzo/merge-hris-link-account-workflow.yml
    name: Merge HRIS Link an Account
    summary: Create a Merge Link token, exchange the returned public token for an account token, and confirm the linked HRIS account.
  - url: arazzo/merge-hris-list-employees-and-time-off-workflow.yml
    name: Merge HRIS Employee Directory with Time Off
    summary: List employees from a linked HRIS account, then read each employee's record and time off requests.
  - url: arazzo/merge-knowledgebase-link-and-browse-workflow.yml
    name: Merge Knowledge Base Link and Browse Articles
    summary: Exchange a public token for an account token, list knowledge base containers, and list the articles within the first container.
  - url: arazzo/merge-ticketing-create-ticket-with-comment-workflow.yml
    name: Merge Ticketing Open a Ticket with a First Comment
    summary: Create a ticket on a linked ticketing system, add an opening comment to it, and confirm the ticket.
  - url: arazzo/merge-ticketing-link-account-workflow.yml
    name: Merge Ticketing Link an Account
    summary: Create a Merge Link token for the Ticketing category, exchange the public token for an account token, and confirm the linked ticketing system.
