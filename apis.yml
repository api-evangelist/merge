aid: merge
url: >-
  https://raw.githubusercontent.com/api-evangelist/merge/refs/heads/main/apis.yml
apis:
  - aid: merge:merge
    name: Merge
    tags:
      - Unified API
      - Integrations
      - Platform
    humanURL: ' https://www.merge.dev/'
    properties:
      - url: ' https://www.merge.dev/'
        type: Documentation
    description: >-
      Merge is the leading provider of customer-facing integrations for frontier
      LLMs, Fortune 500 organizations, and thousands of other B2B SaaS
      companies
  - aid: merge:hris-api
    name: Merge HRIS API
    tags:
      - Unified API
      - HRIS
      - Human Resources
      - Payroll
      - Directory
    humanURL: https://www.merge.dev/categories/hr-payroll-api
    properties:
      - url: https://www.merge.dev/categories/hr-payroll-api
        type: Website
      - url: https://docs.merge.dev/hris/
        type: Documentation
    description: >-
      Merge HRIS API provides a unified interface to integrate every HR,
      payroll, and SCIM directory system with one API. It normalizes data
      across 80+ HR platforms including Workday, BambooHR, Gusto, Rippling,
      ADP, and many more, enabling developers to deliver integrations in
      days instead of quarters.
  - aid: merge:ats-api
    name: Merge ATS API
    tags:
      - Unified API
      - ATS
      - Recruiting
      - Applicant Tracking
    humanURL: https://www.merge.dev/categories/ats-recruiting-api
    properties:
      - url: https://www.merge.dev/categories/ats-recruiting-api
        type: Website
      - url: https://docs.merge.dev/ats/
        type: Documentation
    description: >-
      Merge ATS API enables connection to every applicant tracking system with
      one API. It provides standardized data schemas for candidates,
      applications, interviews, and job postings across 50+ recruiting
      platforms including Greenhouse, Lever, Workday, iCIMS, and Jobvite.
  - aid: merge:accounting-api
    name: Merge Accounting API
    tags:
      - Unified API
      - Accounting
      - Finance
    humanURL: https://www.merge.dev/categories/accounting-api
    properties:
      - url: https://www.merge.dev/categories/accounting-api
        type: Website
      - url: https://docs.merge.dev/accounting/overview/
        type: Documentation
    description: >-
      Merge Accounting API provides a unified API for accounting integrations,
      enabling read and write access to financial data across major accounting
      systems including QuickBooks Online, Xero, NetSuite, and Sage Intacct.
      It supports journal entries, payments, invoices, and other financial
      transaction data.
  - aid: merge:ticketing-api
    name: Merge Ticketing API
    tags:
      - Unified API
      - Ticketing
      - Project Management
    humanURL: https://www.merge.dev/categories/ticketing-api
    properties:
      - url: https://www.merge.dev/categories/ticketing-api
        type: Website
      - url: https://docs.merge.dev/ticketing/overview/
        type: Documentation
    description: >-
      Merge Ticketing API provides unified access to 30+ ticketing and project
      management systems including Jira, Asana, Linear, Zendesk, Freshdesk,
      GitHub Issues, and ServiceNow. It normalizes ticketing data objects
      including tickets, comments, attachments, contacts, teams, and tags
      with read and write capabilities.
  - aid: merge:crm-api
    name: Merge CRM API
    tags:
      - Unified API
      - CRM
      - Customer Relationship Management
    humanURL: https://www.merge.dev/categories/crm-api
    properties:
      - url: https://www.merge.dev/categories/crm-api
        type: Website
      - url: https://docs.merge.dev/crm/overview/
        type: Documentation
    description: >-
      Merge CRM API provides unified access to 20+ CRM platforms including
      Salesforce, HubSpot, Pipedrive, and Zoho CRM. It offers read and write
      capabilities for standardized CRM data objects such as Accounts,
      Contacts, Leads, Opportunities, and Engagements, along with custom
      object support.
  - aid: merge:file-storage-api
    name: Merge File Storage API
    tags:
      - Unified API
      - File Storage
      - Documents
    humanURL: https://www.merge.dev/categories/file-storage-api
    properties:
      - url: https://www.merge.dev/categories/file-storage-api
        type: Website
      - url: https://docs.merge.dev/filestorage/
        type: Documentation
    description: >-
      Merge File Storage API provides unified access to file storage platforms
      including Box, Dropbox, Google Drive, OneDrive, and SharePoint. It
      normalizes access to Drives, Files, Folders, Groups, and Users with a
      built-in File Picker component for browsing connected storage accounts.
  - aid: merge:knowledge-base-api
    name: Merge Knowledge Base API
    tags:
      - Unified API
      - Knowledge Base
      - Content Management
    humanURL: https://www.merge.dev/categories/knowledge-base
    properties:
      - url: https://www.merge.dev/categories/knowledge-base
        type: Website
      - url: https://docs.merge.dev/knowledgebase/overview/
        type: Documentation
    description: >-
      Merge Knowledge Base API provides unified access to knowledge base
      platforms including Confluence and Notion. It normalizes access to
      Articles, Attachments, Containers, Groups, and Users, with ACL
      management that maps users, groups, and company-level permissions
      across platforms for enterprise AI context and search.
  - aid: merge:chat-api
    name: Merge Chat API
    tags:
      - Unified API
      - Chat
      - Messaging
    humanURL: https://www.merge.dev/categories/chat
    properties:
      - url: https://www.merge.dev/categories/chat
        type: Website
    description: >-
      Merge Chat Unified API provides real-time, normalized access to chat
      and messaging platforms including Microsoft Teams, with Slack on the
      roadmap. It normalizes five core object types including Messages,
      Conversations, Users, Groups, and Members, enabling enterprise search,
      context-aware AI agents, and near-real-time insights.
  - aid: merge:agent-handler
    name: Merge Agent Handler
    tags:
      - AI Agents
      - MCP
      - Tool Use
      - Integrations
    humanURL: https://www.merge.dev/merge-agent-handler
    properties:
      - url: https://www.merge.dev/merge-agent-handler
        type: Website
      - url: https://docs.ah.merge.dev/Overview/Agent-Handler-intro
        type: Documentation
      - url: https://help.ah.merge.dev/
        type: Support
    description: >-
      Merge Agent Handler enables AI agents to connect with thousands of
      pre-built tools for taking real-time actions. It manages authentication,
      rate limits, error handling, and provides security controls that scan
      tool inputs and responses for sensitive data to prevent data misuse.
